ymlname: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create app com.ammorshed6.vehiclemanager VehicleManager
          cd app
          cordova platform add android

      - name: Copy HTML to Cordova
        run: |
          cp index.html app/www/index.html

      - name: Build APK
        run: |
          cd app
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: VehicleManager-APK
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
